x-node-service: &node-service
  build:
    context: .
    target: build
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - .:/app
    - node_modules:/app/node_modules
    - api_node_modules:/app/api/node_modules
    - common_node_modules:/app/common/node_modules
    - ui_node_modules:/app/ui/node_modules
    - web_node_modules:/app/web/node_modules
    - admin_node_modules:/app/admin/node_modules

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    <<: *node-service
    ports:
      - "${API_PORT:-6660}:6660"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:wait -w api && npm run db:up -w api && npm run dev -w api"

  web:
    <<: *node-service
    ports:
      - "${WEB_PORT:-6661}:6661"
    depends_on:
      - api
    command: npm run dev -w web -- --host 0.0.0.0

  admin:
    <<: *node-service
    ports:
      - "${ADMIN_PORT:-6662}:6662"
    depends_on:
      - api
    command: npm run dev -w admin -- --host 0.0.0.0

  storybook:
    <<: *node-service
    ports:
      - "${STORYBOOK_PORT:-6663}:6663"
    command: npm run dev -w ui -- --host 0.0.0.0

volumes:
  postgres_data:
  node_modules:
  api_node_modules:
  common_node_modules:
  ui_node_modules:
  web_node_modules:
  admin_node_modules:
