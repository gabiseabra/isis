x-node-service: &node-service
  build:
    context: .
    target: build
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - .:/app
    - node_modules:/app/node_modules

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    <<: *node-service
    ports:
      - "${HOST_API_PORT}:${API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm run db:wait -w api
      && if find api/db -maxdepth 1 -name '*.sql' -print -quit | grep -q .; then npm run db:up -w api; else echo 'No db migrations found; skipping db:up'; fi
      && npm run dev -w api"

  web:
    <<: *node-service
    ports:
      - "${WEB_PORT}:6661"
    depends_on:
      - api
    command: npm run dev -w web -- --host 0.0.0.0

  admin:
    <<: *node-service
    ports:
      - "${ADMIN_PORT}:6662"
    depends_on:
      - api
    command: npm run dev -w admin -- --host 0.0.0.0

  storybook:
    <<: *node-service
    ports:
      - "${STORYBOOK_PORT}:6663"
    command: npm run dev -w ui -- --host 0.0.0.0

volumes:
  postgres_data:
  node_modules:
